<!DOCTYPE html>
<html>

<head>
    <title>Tambah Barang</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-success shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-plus-circle"></i> Tambah Barang
            </span>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="card shadow border-0">
            <div class="card-body p-4">

                <h4 class="mb-4 fw-bold text-success">
                    <i class="bi bi-box-seam"></i> Form Input Barang
                </h4>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Nama Barang</label>
                        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama barang">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Kategori</label>
                        <input type="text" id="kategori" class="form-control" placeholder="Contoh: Makanan, Minuman">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Harga</label>
                        <div class="input-group">
                            <span class="input-group-text">Rp</span>
                            <input type="number" id="harga" class="form-control" placeholder="0">
                        </div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Stok</label>
                        <input type="number" id="stok" class="form-control" placeholder="Jumlah stok">
                    </div>

                    <div class="col-12 mb-4">
                        <label class="form-label fw-semibold">Supplier</label>
                        <input type="text" id="supplier" class="form-control" placeholder="Nama supplier">
                    </div>

                </div>

                <div class="d-flex justify-content-end">
                    <button onclick="tambahBarang()" class="btn btn-success me-2 shadow-sm">SIMPAN</button>

                    <a href="index.html" class="btn btn-outline-secondary">
                        BATAL
                    </a>
                </div>

            </div>
        </div>

    </div>

    <footer class="text-center mt-5 mb-3 text-muted">
        <small>© 2026 Stok Tokoku</small>
    </footer>

    <script src="script.js"></script>

</body>

</html>
