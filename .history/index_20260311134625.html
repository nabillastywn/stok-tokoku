<!DOCTYPE html>
<html>

<head>
    <title>Stok Tokoku</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-shop"></i> Stok Tokoku
            </span>
            <button onclick="logout()" class="btn btn-danger btn-sm">
                Logout<i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <div class="container mt-5">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold">Daftar Stok Barang</h3>
                <small class="text-muted">Manajemen stok toko kelontong</small>
            </div>

            <a href="tambah-stok.html" class="btn btn-success shadow-sm">TAMBAH BARANG</a>
        </div>

        <!-- Card -->
        <div class="card shadow-sm border-0">
            <div class="card-body">

                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="table-success">
                            <tr>
                                <th>No</th>
                                <th>Nama</th>
                                <th>Kategori</th>
                                <th>Harga</th>
                                <th>Stok</th>
                                <th>Supplier</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="dataBarang"></tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="text-center mt-5 mb-3 text-muted">
        <small>© 2026 Stok Tokoku</small>
    </footer>

    <script src="script.js"></script>

</body>

</html>
