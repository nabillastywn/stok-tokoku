<!DOCTYPE html>
<html>

<head>
    <title>Tambah Barang</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4>Tambah Barang</h4>
            </div>
            <div class="card-body">

                <div class="mb-3">
                    <label>Nama Barang</label>
                    <input type="text" id="nama" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Kategori</label>
                    <input type="text" id="kategori" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Harga</label>
                    <input type="number" id="harga" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Stok</label>
                    <input type="number" id="stok" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Supplier</label>
                    <input type="text" id="supplier" class="form-control">
                </div>

                <button onclick="tambahBarang()" class="btn btn-success">
                    Simpan
                </button>

                <a href="index.html" class="btn btn-secondary">
                    Kembali
                </a>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
